<html lang="en">
<head>

<meta charset="UTF-8">

content="width=device-width, initial-scale=1.0">

<title>Reports Dashboard</title>

 <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

  <link
    rel="stylesheet"
    href="reports.css"
  >
</head>

<body>
    <div class="sidebar">

  <h2>Reports</h2>

 <ul>
                     <li>
                    <a href="../dashboard/dashboard.html" class="active">
                   <i class='bx bx-grid-alt' ></i>
                      <span class ="link-name">Dashboard</span>
                 
                    </a>
                    </li>
                  
                    
                     <li>
                    <a href="../user/user.html">
                     <i class='bx bx-user' ></i>
                      <span class ="link-name">Users</span>
                    
                    </a>
                    </li>

                     <li>
                    <a href="../Events/Events.html">
                      <i class='bx bx-calendar' ></i>
                      <span class ="link-name">Events</span>
                    </a>
                    </li>

                     <li>
                    <a href="../messages/messages.html">
                   <i class='bx bx-message-rounded-dots' ></i>
                      <span class ="link-name">Messages</span>
                     
                    </a>
                    </li>
                    
                     <li>
                    <a href="../report/reports.html">
                      <i class='bx bx-bar-chart' ></i>
                      <span class ="link-name">Reports</span>
                    </a>
                    </li>

                     <li>
                    <a href="../settings/settings.html">
                      <i class='bx bx-cog' ></i>
                      <span class ="link-name">Settings</span>
                     
                    </a>
                    </li>
                       
                     <li>
                    <a href="../profile/profile.html">
                    <i class='bx bxs-user-circle' ></i>
                      <span class ="link-name">profile</span> 
                    </a>
                    </li> 
            
                    </a>

                    </li>
                   
                  </ul>
                </div>
         
        </aside>   
    </div>



<div class="reports-container">

    <!-- HEADER -->

    <div class="reports-header">

        <h1>Reports & Analytics</h1>

        <div class="report-buttons">

            <button id="generateReportBtn">
                Generate Report
            </button>

            <button id="exportPdfBtn">
                Export PDF
            </button>

            <button id="exportExcelBtn">
                Export Excel
            </button>

        </div>

    </div>



    <!-- REPORT CARDS -->

    <div class="report-cards">

        <div class="report-card">

            <i class="fa-solid fa-users"></i>

            <h3>Total Members</h3>

            <h2 id="membersCount">
                0
            </h2>

        </div>



        <div class="report-card">

            <i class="fa-solid fa-calendar"></i>

            <h3>Total Events</h3>

            <h2 id="eventsCount">
                0
            </h2>

        </div>



        <div class="report-card">

            <i class="fa-solid fa-envelope"></i>

            <h3>Messages Sent</h3>

            <h2 id="messagesCount">
                0
            </h2>

        </div>



        <div class="report-card">

            <i class="fa-solid fa-briefcase"></i>

            <h3>Opportunities Posted</h3>

            <h2 id="opportunitiesCount">
                0
            </h2>

        </div>

    </div>



    <!-- REPORT TABLE -->

    <div class="report-table-container">

        <table id="reportTable">

            <tr>

                <th>Date</th>
                <th>Activity</th>
                <th>Status</th>

            </tr>

        </table>

    </div>

</div>

<script src="reports.js"></script>

</body>
</html>
