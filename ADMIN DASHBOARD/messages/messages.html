                </div>
         
        </aside>

<div class="main-content">

  <div class="top-bar">

    <h1>Messages</h1>

    <input
      type="text"
      placeholder="Search messages..."
    >

  </div>



  <div class="messages-container">


    <!-- CHAT LIST -->

    <div class="chat-list">

      <div class="chat-user active">

        <img
          src="images/profile admin.jpeg"
        >

        <div>

          <h3>Precious Peace</h3>

          <p>Hello Admin...</p>

        </div>

      </div>



      <div class="chat-user">

        <img
          src="images/profile admin.jpeg"
        >

        <div>

          <h3>Nabirah</h3>

          <p>Can you help me?</p>

        </div>

      </div>

    </div>



    <!-- CHAT BOX -->

    <div class="chat-box">

      <div class="chat-header">

        <img
          src="images/profile admin.jpeg"
        >

        <h3>Precious Peace</h3>

      </div>



      <div class="chat-body" id="chatBody">

        <div class="message received">
          Hello Admin 👋
        </div>

        <div class="message sent">
          Hello, how can I help?
        </div>

      </div>



      <div class="chat-input">

        <input
          type="text"
          id="messageInput"
          placeholder="Type message..."
        >

        <button id="sendBtn">
          Send
        </button>

      </div>

    </div>

  </div>

</div>

<script src="messages.js"></script>
